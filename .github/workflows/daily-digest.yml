name: Daily Research Digest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: Optional digest date in YYYY-MM-DD format
        required: false
        type: string
      send:
        description: Send the digest email
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 15 * * *"
    - cron: "0 16 * * *"

concurrency:
  group: daily-research-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: [self-hosted, codex]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve date and send mode
        shell: bash
        run: |
          SHOULD_RUN=true
          AUTOMATION_MODE="${{ vars.DIGEST_AUTOMATION_MODE || 'self-hosted' }}"
          if [[ -n "${{ github.event.inputs.target_date }}" ]]; then
            TARGET_DATE="${{ github.event.inputs.target_date }}"
          else
            TARGET_DATE="$(TZ=America/Los_Angeles date +%F)"
          fi
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "$AUTOMATION_MODE" != "self-hosted" ]]; then
              SHOULD_RUN=false
            fi
            LOCAL_HOUR="$(TZ=America/Los_Angeles date +%H)"
            if [[ "$LOCAL_HOUR" != "08" ]]; then
              SHOULD_RUN=false
            fi
            SEND=true
          else
            SEND="${{ github.event.inputs.send || 'false' }}"
          fi
          echo "TARGET_DATE=$TARGET_DATE" >> "$GITHUB_ENV"
          echo "SEND=$SEND" >> "$GITHUB_ENV"
          echo "SHOULD_RUN=$SHOULD_RUN" >> "$GITHUB_ENV"
          echo "AUTOMATION_MODE=$AUTOMATION_MODE" >> "$GITHUB_ENV"

      - name: Build image
        if: env.SHOULD_RUN == 'true'
        shell: bash
        run: docker build -t send-me-research:latest .

      - name: Run auth check
        if: env.SHOULD_RUN == 'true'
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/app \
            -v "$PWD:/workspace" \
            -v "$HOME/.codex:/home/app/.codex" \
            send-me-research:latest \
            send-me-research auth-check

      - name: Build preview or send digest
        if: env.SHOULD_RUN == 'true'
        shell: bash
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TIMEZONE: America/Los_Angeles
        run: |
          if [[ "$SEND" == "true" ]]; then
            COMMAND=(send-me-research run-digest --date "$TARGET_DATE" --send)
          else
            COMMAND=(send-me-research preview-digest --date "$TARGET_DATE")
          fi
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/home/app \
            -e EMAIL_TO \
            -e EMAIL_FROM \
            -e SMTP_HOST \
            -e SMTP_PORT \
            -e SMTP_USERNAME \
            -e SMTP_PASSWORD \
            -e DIGEST_TIMEZONE \
            -v "$PWD:/workspace" \
            -v "$HOME/.codex:/home/app/.codex" \
            send-me-research:latest \
            "${COMMAND[@]}"

      - name: Upload digest artifact
        if: success() && env.SHOULD_RUN == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ env.TARGET_DATE }}-self-hosted
          path: out/digests/${{ env.TARGET_DATE }}
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit updated state
        if: success() && env.SHOULD_RUN == 'true'
        shell: bash
        run: |
          if [[ -n "$(git status --porcelain state)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state
            git commit -m "Update digest state for $TARGET_DATE"
            git push
          fi

      - name: Skip off-hour duplicate cron
        if: env.SHOULD_RUN != 'true'
        shell: bash
        run: echo "Skipping scheduled run for mode '$AUTOMATION_MODE' or because it is not 08:00 in America/Los_Angeles."
