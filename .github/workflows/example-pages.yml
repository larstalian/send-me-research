name: Publish Example Digest

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/example-pages.yml"
      - "README.md"
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/render_example_digest.py"
      - "src/send_me_research/**"
      - "templates/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: example-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync project
        run: uv sync --frozen --no-dev

      - name: Build example digest
        run: |
          uv run python scripts/render_example_digest.py
          mkdir -p _site
          cp examples/digest-example/digest.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
